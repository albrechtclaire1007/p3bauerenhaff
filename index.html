<!DOCTYPE html>
<html lang="lb">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>P3 – Bauerenhaff</title>

<style>
@font-face{
  font-family:'Schoulschrëft';
  src:url('https://raw.githubusercontent.com/albrechtclaire1007/schoulschreft/main/schoulschreft_bold%5B2%5D.TTF') format('truetype');
  font-weight:bold;
  font-style:normal;
  font-display:swap;
}

:root{
  /* P3 light blue background */
  --bg1:#E7F5FF;
  --bg2:#CFEAFF;

  /* bar + accents */
  --bar:#6FAFE6;
  --barBorder:#4D90CD;

  --ink:#1f1f1f;
  --white:#fff;
  --border:3px;
  --shadow:0 10px 24px rgba(0,0,0,.08);
  --pad:clamp(10px,2.2vw,16px);
  --r:18px;

  /* icons */
  --iconArrow:"https://i.postimg.cc/QBYTSN08/p3arrow.png";
  --iconPlay:"https://i.postimg.cc/ZB9yQkMt/p3play.png";
  --iconReplay:"https://i.postimg.cc/ft30P4rQ/p3replay.png";

  --good:#b8efc8;
  --bad:#ffd6d6;
  --line:#d7e8f7;
  --soft:#ffffff;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  outline:none;
}

html,body{
  height:100%;
  margin:0;
  background:linear-gradient(135deg,var(--bg2),var(--bg1));
  color:var(--ink);
  font-family:'Schoulschrëft', Arial, sans-serif;
}

.hidden{
  display:none!important;
}

/* ===== TOP BAR (everything inside) ===== */
.topBar{
  position:sticky;
  top:10px;
  z-index:10;
  width:min(1200px,96vw);
  margin:10px auto 0;
  background:var(--bar);
  border:var(--border) solid var(--barBorder);
  border-radius:999px;
  box-shadow:var(--shadow);
  padding:10px 12px;
  display:grid;
  grid-template-columns:70px 1fr auto;
  align-items:center;
  gap:10px;
}

.barBtn{
  border:none;
  background:transparent;
  cursor:pointer;
  display:grid;
  place-items:center;
  width:54px;
  height:54px;
}

.barBtn:active{
  transform:scale(.98);
}

.barBtn img{
  width:46px;
  height:46px;
  object-fit:contain;
}

.barBtn.back img{
  transform:rotate(180deg);
}

.barTitle{
  text-align:center;
  color:#fff;
  font-size:clamp(1.5rem,3.2vw,2.4rem);
  margin:0;
  line-height:1.1;
  padding:0 6px;
}

.barRight{
  display:flex;
  align-items:center;
  gap:6px;
}

.barRight .barBtn{
  width:50px;
  height:50px;
}

.barRight .barBtn img{
  width:42px;
  height:42px;
}

/* ===== CONTENT ===== */
.wrap{
  width:min(1200px,96vw);
  margin:18px auto 26px;
  padding:var(--pad);
  display:flex;
  flex-direction:column;
  gap:14px;
}

.card{
  background:rgba(255,255,255,.8);
  border:var(--border) solid rgba(255,255,255,.65);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  padding:clamp(12px,2.2vw,18px);
}

.cardTitle{
  margin:0 0 8px 0;
  font-size:clamp(1.1rem,2.2vw,1.5rem);
  opacity:.9;
}

.placeholder{
  border:3px dashed rgba(0,0,0,.2);
  border-radius:14px;
  padding:18px;
  background:rgba(255,255,255,.55);
  font-size:1.05rem;
  opacity:.85;
}

/* ===== GAME UI ===== */
.topRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.pill{
  background:#fff;
  border:3px solid var(--line);
  border-radius:999px;
  padding:8px 14px;
  font-size:clamp(.95rem,1.8vw,1.1rem);
}

.instructions{
  text-align:center;
  font-size:clamp(1rem,2vw,1.2rem);
  min-height:28px;
  margin-bottom:10px;
}

.feedback{
  text-align:center;
  font-size:clamp(1rem,2vw,1.2rem);
  min-height:30px;
  margin-bottom:12px;
}

.feedback.good{
  color:#1f7c42;
}

.feedback.bad{
  color:#b53b3b;
}

.centerBox{
  border:3px dashed var(--line);
  border-radius:16px;
  background:rgba(255,255,255,.55);
  padding:14px;
  text-align:center;
  margin-bottom:14px;
  font-size:clamp(1rem,2vw,1.15rem);
}

.choiceGrid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}

.choiceBtn{
  border:3px solid var(--line);
  border-radius:18px;
  background:var(--soft);
  box-shadow:var(--shadow);
  padding:12px;
  cursor:pointer;
  font-family:'Schoulschrëft', Arial, sans-serif;
  color:var(--ink);
}

.choiceBtn:active{
  transform:scale(.98);
}

.choiceBtn img{
  width:100%;
  max-width:220px;
  max-height:150px;
  object-fit:contain;
  display:block;
  margin:0 auto 8px auto;
}

.choiceLabel{
  text-align:center;
  font-size:clamp(1rem,2vw,1.2rem);
}

.good{
  background:var(--good)!important;
}

.bad{
  background:var(--bad)!important;
}

.memoryGrid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:12px;
}

.memoryCard{
  min-height:120px;
  border:3px solid var(--line);
  border-radius:18px;
  background:var(--soft);
  box-shadow:var(--shadow);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:8px;
  font-family:'Schoulschrëft', Arial, sans-serif;
  color:var(--ink);
}

.memoryCard:active{
  transform:scale(.98);
}

.memoryCard img{
  width:100%;
  max-width:110px;
  max-height:85px;
  object-fit:contain;
}

.memoryBack{
  font-size:2rem;
}

.doneBox{
  border:3px dashed var(--line);
  border-radius:16px;
  background:rgba(255,255,255,.55);
  padding:24px 16px;
  text-align:center;
  font-size:clamp(1.1rem,2.4vw,1.35rem);
}

@media (max-width:760px){
  .choiceGrid{
    grid-template-columns:1fr;
  }

  .memoryGrid{
    grid-template-columns:repeat(3,minmax(0,1fr));
  }
}

@media (max-width:520px){
  .memoryGrid{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }
}
</style>
</head>

<body>

<div class="topBar">
  <button class="barBtn back" id="prev" aria-label="Virdrun">
    <img src="https://i.postimg.cc/QBYTSN08/p3arrow.png" alt="">
  </button>

  <h1 class="barTitle" id="gameTitle">P3 – Lauschter a klick</h1>

  <div class="barRight">
    <button class="barBtn" id="play" aria-label="Play">
      <img src="https://i.postimg.cc/ZB9yQkMt/p3play.png" alt="">
    </button>
    <button class="barBtn" id="replay" aria-label="Replay">
      <img src="https://i.postimg.cc/ft30P4rQ/p3replay.png" alt="">
    </button>
    <button class="barBtn" id="next" aria-label="Nächst">
      <img src="https://i.postimg.cc/QBYTSN08/p3arrow.png" alt="">
    </button>
  </div>
</div>

<div class="wrap">
  <div class="card">
    <div class="topRow">
      <p class="cardTitle" id="cardTitle">Spill 1</p>
      <div class="pill" id="gameCount">1 / 2</div>
    </div>

    <div class="instructions" id="instructions"></div>
    <div class="feedback" id="feedback"></div>
    <div id="gameArea"></div>
  </div>
</div>

<script>
const AUDIO_BASE = 'https://github.com/albrechtclaire1007/p3bauerenhaff/raw/refs/heads/main/';

const ITEMS = [
  { id:'bauer', word:'de Bauer', img:'https://i.postimg.cc/Z0dNtv6g/bauer.png', audio:'BAUER.mp3' },
  { id:'gees', word:'d’Gees', img:'https://i.postimg.cc/PC7Nc6pp/gees.png', audio:'GEESS.mp3' },
  { id:'fierkel', word:'d’Fierkel', img:'https://i.postimg.cc/FdjhGvJw/fiekel.png', audio:'FIERKEL.mp3' },
  { id:'fillen', word:'de Fillen', img:'https://i.postimg.cc/5YwfpJCW/fillen.png', audio:'FILLEN.mp3' },
  { id:'hong', word:'den Hong', img:'https://i.postimg.cc/R3nqzcwC/hong.png', audio:'HONG.mp3' },
  { id:'iesel', word:'den Iesel', img:'https://i.postimg.cc/R3nqzcwx/iesel.png', audio:'IESEL.mp3' },
  { id:'int', word:'d’Int', img:'https://i.postimg.cc/8FrsVhLP/int.png', audio:'INT.mp3' },
  { id:'jippelchen', word:'d’Jippelchen', img:'https://i.postimg.cc/phbrVpBN/jippelchen.png', audio:'JIPPELCHEN.mp3' },
  { id:'kallef', word:'d’Kallef', img:'https://i.postimg.cc/R65hCNTZ/kallef.png', audio:'KALLEF.mp3' },
  { id:'kou', word:'d’Kou', img:'https://i.postimg.cc/Fd5zF7xR/kou.png', audio:'KOU.mp3' },
  { id:'lammchen', word:'d’Lämmchen', img:'https://i.postimg.cc/zbZvDVkR/lammchen.png', audio:'LAMMCHEN.mp3' },
  { id:'paerd', word:'d’Päerd', img:'https://i.postimg.cc/R67FW4Ps/paerd.png', audio:'PAERD.mp3' },
  { id:'schof', word:'d’Schof', img:'https://i.postimg.cc/jwH5Dt89/schof.png', audio:'SCHOF.mp3' }
];

const GAME_TITLES = [
  'P3 – Lauschter a klick',
  'P3 – Memory'
];

const memoryBaseItems = [
  ITEMS.find(x => x.id === 'bauer'),
  ITEMS.find(x => x.id === 'kou'),
  ITEMS.find(x => x.id === 'hong'),
  ITEMS.find(x => x.id === 'int'),
  ITEMS.find(x => x.id === 'paerd'),
  ITEMS.find(x => x.id === 'schof')
];

const gameTitle = document.getElementById('gameTitle');
const cardTitle = document.getElementById('cardTitle');
const gameCount = document.getElementById('gameCount');
const instructions = document.getElementById('instructions');
const feedback = document.getElementById('feedback');
const gameArea = document.getElementById('gameArea');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const playBtn = document.getElementById('play');

let currentGame = 0;
let audio = null;

/* ===== GAME 1 STATE ===== */
let listenOrder = [];
let listenIndex = 0;
let listenLocked = false;

/* ===== GAME 2 STATE ===== */
let memoryCards = [];
let memoryFirst = null;
let memorySecond = null;
let memoryLocked = false;
let memoryMatches = 0;

function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setFeedback(text, cls){
  feedback.textContent = text || '';
  feedback.className = 'feedback' + (cls ? ' ' + cls : '');
}

function stopAudio(){
  if(audio){
    audio.pause();
    audio.currentTime = 0;
  }
}

function playAudio(file){
  stopAudio();
  audio = new Audio(AUDIO_BASE + file);
  audio.play().catch(()=>{});
}

function updateTopBar(){
  gameTitle.textContent = GAME_TITLES[currentGame];
  cardTitle.textContent = 'Spill ' + (currentGame + 1);
  gameCount.textContent = (currentGame + 1) + ' / ' + GAME_TITLES.length;
  prevBtn.style.opacity = currentGame === 0 ? '.45' : '1';
  nextBtn.style.opacity = currentGame === GAME_TITLES.length - 1 ? '.45' : '1';
  playBtn.style.opacity = currentGame === 0 ? '1' : '.45';
}

/* ===== GAME 1 ===== */
function initListenGame(){
  listenOrder = shuffle(ITEMS);
  listenIndex = 0;
  listenLocked = false;
}

function currentListenItem(){
  return listenOrder[listenIndex];
}

function renderListenGame(){
  const item = currentListenItem();

  if(!item){
    instructions.textContent = 'Bravo!';
    setFeedback('Fäerdeg!', 'good');
    gameArea.innerHTML = '<div class="doneBox">Du hues Spill 1 fäerdeg. Klick op de Pfeil no riets fir Spill 2.</div>';
    return;
  }

  instructions.textContent = 'Lauschter a klick op dat richtegt Bild.';
  setFeedback('', '');
  listenLocked = false;

  const choices = shuffle([
    item,
    ...shuffle(ITEMS.filter(x => x.id !== item.id)).slice(0, 3)
  ]);

  let html = '';
  html += '<div class="centerBox">' + (listenIndex + 1) + ' / ' + listenOrder.length + '</div>';
  html += '<div class="choiceGrid">';

  choices.forEach(choice=>{
    html += `
      <button class="choiceBtn" data-id="${choice.id}">
        <img src="${choice.img}" alt="${choice.word}">
        <div class="choiceLabel">${choice.word}</div>
      </button>
    `;
  });

  html += '</div>';
  gameArea.innerHTML = html;

  const buttons = gameArea.querySelectorAll('.choiceBtn');

  buttons.forEach(btn=>{
    btn.onclick = function(){
      if(listenLocked) return;

      const pickedId = btn.getAttribute('data-id');

      if(pickedId === item.id){
        listenLocked = true;
        btn.classList.add('good');
        setFeedback('Richteg!', 'good');

        setTimeout(function(){
          listenIndex++;
          renderListenGame();
        }, 700);
      }else{
        btn.classList.add('bad');
        setFeedback('Nach eng Kéier probéieren.', 'bad');

        setTimeout(function(){
          btn.classList.remove('bad');
          setFeedback('', '');
        }, 500);
      }
    };
  });
}

/* ===== GAME 2 ===== */
function initMemoryGame(){
  const cards = [];

  memoryBaseItems.forEach(item=>{
    cards.push({
      uid:'img-' + item.id,
      pair:item.id,
      type:'img',
      value:item.img,
      audio:item.audio,
      open:false,
      matched:false
    });

    cards.push({
      uid:'word-' + item.id,
      pair:item.id,
      type:'word',
      value:item.word,
      audio:item.audio,
      open:false,
      matched:false
    });
  });

  memoryCards = shuffle(cards);
  memoryFirst = null;
  memorySecond = null;
  memoryLocked = false;
  memoryMatches = 0;
}

function renderMemoryGame(){
  if(memoryMatches === memoryBaseItems.length){
    instructions.textContent = 'Bravo!';
    setFeedback('Fäerdeg!', 'good');
    gameArea.innerHTML = '<div class="doneBox">Du hues Spill 2 fäerdeg. Klick op ↻ fir nach eng Kéier ze spillen.</div>';
    return;
  }

  instructions.textContent = 'Fann d’Puer: Bild + Wuert.';
  setFeedback('', '');

  let html = '';
  html += '<div class="centerBox">' + memoryMatches + ' / ' + memoryBaseItems.length + '</div>';
  html += '<div class="memoryGrid">';

  memoryCards.forEach(card=>{
    let inside = '<div class="memoryBack">?</div>';

    if(card.open || card.matched){
      if(card.type === 'img'){
        inside = '<img src="' + card.value + '" alt="">';
      }else{
        inside = '<div>' + card.value + '</div>';
      }
    }

    html += '<button class="memoryCard' + (card.matched ? ' good' : '') + '" data-uid="' + card.uid + '">' + inside + '</button>';
  });

  html += '</div>';
  gameArea.innerHTML = html;

  const buttons = gameArea.querySelectorAll('.memoryCard');

  buttons.forEach(btn=>{
    btn.onclick = function(){
      if(memoryLocked) return;

      const uid = btn.getAttribute('data-uid');
      const card = memoryCards.find(c => c.uid === uid);

      if(!card || card.open || card.matched) return;

      card.open = true;

      if(card.type === 'word'){
        playAudio(card.audio);
      }

      if(memoryFirst === null){
        memoryFirst = card;
        renderMemoryGame();
        return;
      }

      memorySecond = card;
      memoryLocked = true;
      renderMemoryGame();

      if(memoryFirst.pair === memorySecond.pair){
        setFeedback('Bravo!', 'good');

        setTimeout(function(){
          memoryFirst.matched = true;
          memorySecond.matched = true;
          memoryFirst = null;
          memorySecond = null;
          memoryLocked = false;
          memoryMatches++;
          renderMemoryGame();
        }, 550);
      }else{
        setFeedback('Dat passt net.', 'bad');

        setTimeout(function(){
          memoryFirst.open = false;
          memorySecond.open = false;
          memoryFirst = null;
          memorySecond = null;
          memoryLocked = false;
          renderMemoryGame();
        }, 850);
      }
    };
  });
}

/* ===== MAIN RENDER ===== */
function renderCurrentGame(){
  stopAudio();
  updateTopBar();

  if(currentGame === 0){
    renderListenGame();
  }else{
    renderMemoryGame();
  }
}

function replayCurrentGame(){
  stopAudio();

  if(currentGame === 0){
    initListenGame();
  }else{
    initMemoryGame();
  }

  renderCurrentGame();
}

function playCurrentGameAudio(){
  if(currentGame !== 0) return;

  const item = currentListenItem();
  if(item){
    playAudio(item.audio);
  }
}

/* ===== BUTTONS ===== */
document.getElementById('prev').onclick = function(){
  if(currentGame === 0) return;
  currentGame--;
  renderCurrentGame();
};

document.getElementById('next').onclick = function(){
  if(currentGame === GAME_TITLES.length - 1) return;
  currentGame++;
  renderCurrentGame();
};

document.getElementById('play').onclick = function(){
  playCurrentGameAudio();
};

document.getElementById('replay').onclick = function(){
  replayCurrentGame();
};

/* ===== START ===== */
initListenGame();
initMemoryGame();
renderCurrentGame();
</script>

</body>
</html>
