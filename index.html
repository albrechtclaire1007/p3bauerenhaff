<!DOCTYPE html> <html lang="lb"> <head> <meta charset="utf-8"/> <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/> <title>P3 – Bauerenhaff</title> <style> @font-face{ font-family:'Schoulschrëft'; src:url('https://raw.githubusercontent.com/albrechtclaire1007/schoulschreft/main/schoulschreft_bold%5B2%5D.TTF') format('truetype'); font-weight:bold; font-style:normal; font-display:swap; } :root{ --bg1:#E7F5FF; --bg2:#CFEAFF; --bar:#6FAFE6; --barBorder:#4D90CD; --ink:#1f1f1f; --white:#fff; --border:3px; --shadow:0 10px 24px rgba(0,0,0,.08); --pad:clamp(10px,2.2vw,16px); --r:18px; --iconArrow:"https://i.postimg.cc/QBYTSN08/p3arrow.png"; --iconPlay:"https://i.postimg.cc/ZB9yQkMt/p3play.png"; --iconReplay:"https://i.postimg.cc/ft30P4rQ/p3replay.png"; --good:#BFECC8; --bad:#FFD3D3; --tile:#ffffff; --tileBorder:#cfe3f5; } *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; outline:none;} html,body{ height:100%; margin:0; background:linear-gradient(135deg,var(--bg2),var(--bg1)); color:var(--ink); font-family:'Schoulschrëft', Arial, sans-serif; } .hidden{display:none!important;} /* ===== TOP BAR (everything inside) ===== */ .topBar{ position:sticky; top:10px; z-index:10; width:min(1200px,96vw); margin:10px auto 0; background:var(--bar); border:var(--border) solid var(--barBorder); border-radius:999px; box-shadow:var(--shadow); padding:10px 12px; display:grid; grid-template-columns: 70px 1fr auto; align-items:center; gap:10px; } .barBtn{ border:none; background:transparent; cursor:pointer; display:grid; place-items:center; width:54px; height:54px; } .barBtn:active{transform:scale(.98);} .barBtn img{width:46px; height:46px; object-fit:contain;} .barBtn.back img{transform:rotate(180deg);} .barTitle{ text-align:center; color:#fff; font-size:clamp(1.5rem,3.2vw,2.4rem); margin:0; line-height:1.1; padding:0 6px; } .barRight{ display:flex; align-items:center; gap:6px; } .barRight .barBtn{width:50px; height:50px;} .barRight .barBtn img{width:42px; height:42px;} /* ===== CONTENT ===== */ .wrap{ width:min(1200px,96vw); margin:18px auto 26px; padding:var(--pad); display:flex; flex-direction:column; gap:14px; } .card{ background:rgba(255,255,255,.8); border:var(--border) solid rgba(255,255,255,.65); border-radius:var(--r); box-shadow:var(--shadow); padding:clamp(12px,2.2vw,18px); } .cardTitle{ margin:0 0 8px 0; font-size:clamp(1.1rem,2.2vw,1.5rem); opacity:.9; } .placeholder{ border:3px dashed rgba(0,0,0,.2); border-radius:14px; padding:18px; background:rgba(255,255,255,.55); font-size:1.05rem; opacity:.85; } /* ===== CHAPTER STYLES ===== */ .infoRow{ display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px; } .progress{ font-size:clamp(1rem,2vw,1.25rem); } .feedback{ min-height:1.4em; font-size:clamp(1rem,2vw,1.2rem); } .feedback.good{color:#1f7a39;} .feedback.bad{color:#b33a3a;} .promptBox{ display:grid; place-items:center; min-height:96px; border-radius:16px; border:3px dashed rgba(77,144,205,.35); background:rgba(255,255,255,.65); padding:14px; text-align:center; font-size:clamp(1.1rem,2.4vw,1.45rem); } .grid{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; margin-top:14px; } .option{ border:3px solid var(--tileBorder); background:var(--tile); border-radius:18px; box-shadow:var(--shadow); padding:12px; cursor:pointer; transition:transform .08s ease, background .15s ease, border-color .15s ease; min-height:220px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; } .option:active{transform:scale(.98);} .option img{ width:min(100%,240px); max-height:180px; object-fit:contain; display:block; } .option .label{ text-align:center; font-size:clamp(1rem,2vw,1.25rem); line-height:1.1; } .option.good{ background:var(--good); border-color:#73c785; } .option.bad{ background:var(--bad); border-color:#e78a8a; } .muted{ opacity:.55; pointer-events:none; } .smallNote{ text-align:center; margin-top:10px; font-size:clamp(.95rem,1.9vw,1.1rem); opacity:.8; } .endBox{ display:grid; place-items:center; text-align:center; min-height:240px; padding:20px; border-radius:18px; background:rgba(255,255,255,.7); border:3px dashed rgba(77,144,205,.35); } .endBox h2{ margin:0 0 8px 0; font-size:clamp(1.6rem,3vw,2.2rem); } .endBox p{ margin:0; font-size:clamp(1rem,2vw,1.25rem); } @media (max-width:700px){ .grid{ grid-template-columns:1fr; } .option{ min-height:190px; } } </style> </head> <body> <div class="topBar"> <button class="barBtn back" id="prev" aria-label="Virdrun"> <img src="https://i.postimg.cc/QBYTSN08/p3arrow.png" alt=""> </button> <h1 class="barTitle" id="gameTitle">P3 – Lauschter a klick</h1> <div class="barRight"> <button class="barBtn" id="play" aria-label="Play"> <img src="https://i.postimg.cc/ZB9yQkMt/p3play.png" alt=""> </button> <button class="barBtn" id="replay" aria-label="Replay"> <img src="https://i.postimg.cc/ft30P4rQ/p3replay.png" alt=""> </button> <button class="barBtn" id="next" aria-label="Nächst"> <img src="https://i.postimg.cc/QBYTSN08/p3arrow.png" alt=""> </button> </div> </div> <div class="wrap"> <div class="card"> <div class="infoRow"> <p class="cardTitle">Lauschter a klick op dat richtegt Bild.</p> <div class="progress" id="progress">1 / 13</div> </div>
<div class="promptBox" id="promptBox">
  Klick op ▶︎ a lauschter gutt.
</div>

<div class="feedback" id="feedback"></div>

<div class="grid" id="grid"></div>

<div class="smallNote">▶︎ = lauschteren &nbsp;&nbsp; ↻ = nei mëschen &nbsp;&nbsp; Pfeiler = virdrun / nächst</div>
</div> </div> <script> const AUDIO_BASE = 'https://github.com/albrechtclaire1007/p3bauerenhaff/raw/refs/heads/main/'; const ITEMS = [ { word:'d’Gees', img:'https://i.postimg.cc/PC7Nc6pp/gees.png', audio:'GEESS.mp3' }, { word:'de Bauer', img:'https://i.postimg.cc/Z0dNtv6g/bauer.png', audio:'BAUER.mp3' }, { word:'d’Fierkel', img:'https://i.postimg.cc/FdjhGvJw/fiekel.png', audio:'FIERKEL.mp3' }, { word:'de Fillen', img:'https://i.postimg.cc/5YwfpJCW/fillen.png', audio:'FILLEN.mp3' }, { word:'den Hong', img:'https://i.postimg.cc/R3nqzcwC/hong.png', audio:'HONG.mp3' }, { word:'den Iesel', img:'https://i.postimg.cc/R3nqzcwx/iesel.png', audio:'IESEL.mp3' }, { word:'d’Int', img:'https://i.postimg.cc/8FrsVhLP/int.png', audio:'INT.mp3' }, { word:'d’Jippelchen', img:'https://i.postimg.cc/phbrVpBN/jippelchen.png', audio:'JIPPELCHEN.mp3' }, { word:'d’Kallef', img:'https://i.postimg.cc/R65hCNTZ/kallef.png', audio:'KALLEF.mp3' }, { word:'d’Kou', img:'https://i.postimg.cc/Fd5zF7xR/kou.png', audio:'KOU.mp3' }, { word:'d’Lämmchen', img:'https://i.postimg.cc/zbZvDVkR/lammchen.png', audio:'LAMMCHEN.mp3' }, { word:'d’Päerd', img:'https://i.postimg.cc/R67FW4Ps/paerd.png', audio:'PAERD.mp3' }, { word:'d’Schof', img:'https://i.postimg.cc/jwH5Dt89/schof.png', audio:'SCHOF.mp3' } ]; /* ===== Hooks ===== */ const grid = document.getElementById('grid'); const feedback = document.getElementById('feedback'); const progress = document.getElementById('progress'); const promptBox = document.getElementById('promptBox'); const playBtn = document.getElementById('play'); let order = []; let current = 0; let currentChoices = []; let locked = false; let audio = null; let autoplayTimer = null; function shuffle(arr){ const a = [...arr]; for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; } return a; } function buildAudio(file){ return new Audio(AUDIO_BASE + file); } function stopAudio(){ if(audio){ audio.pause(); audio.currentTime = 0; } } function playCurrent(){ if(current >= order.length) return; stopAudio(); const item = order[current]; audio = buildAudio(item.audio); audio.play().catch(()=>{}); } function setFeedback(text='', cls=''){ feedback.textContent = text; feedback.className = 'feedback' + (cls ? ' ' + cls : ''); } function chooseOptions(correctItem){ const others = ITEMS.filter(x => x.audio !== correctItem.audio); const wrongs = shuffle(others).slice(0,3); return shuffle([correctItem, ...wrongs]); } function updateButtons(){ document.getElementById('prev').style.opacity = current > 0 ? '1' : '.45'; document.getElementById('next').style.opacity = current < order.length - 1 ? '1' : '.45'; playBtn.style.opacity = current < order.length ? '1' : '.45'; } function renderEnd(){ progress.textContent = order.length + ' / ' + order.length; promptBox.innerHTML = ''; grid.innerHTML = ` <div class="endBox"> <div> <h2>Bravo!</h2> <p>Du hues alles fäerdeg.</p> </div> </div> `; setFeedback('Klick op ↻ fir nach eng Kéier ze spillen.', 'good'); updateButtons(); } function render(){ clearTimeout(autoplayTimer); stopAudio(); if(current >= order.length){ renderEnd(); return; } const item = order[current]; currentChoices = chooseOptions(item); locked = false; progress.textContent = (current + 1) + ' / ' + order.length; promptBox.textContent = 'Lauschter a klick op dat richtegt Bild.'; setFeedback(''); grid.innerHTML = ''; currentChoices.forEach(choice=>{ const btn = document.createElement('button'); btn.className = 'option'; btn.innerHTML = ` <img src="${choice.img}" alt="${choice.word}"> <div class="label">${choice.word}</div> `; btn.onclick = ()=>handleChoice(btn, choice, item); grid.appendChild(btn); }); updateButtons(); autoplayTimer = setTimeout(()=>playCurrent(), 350); } function handleChoice(btn, choice, correctItem){ if(locked) return; if(choice.audio === correctItem.audio){ locked = true; btn.classList.add('good'); setFeedback('Richteg!', 'good'); setTimeout(()=>{ current++; render(); }, 700); }else{ btn.classList.add('bad'); setFeedback('Nach eng Kéier probéieren.', 'bad'); setTimeout(()=>{ btn.classList.remove('bad'); setFeedback(''); }, 550); } } function resetGame(){ clearTimeout(autoplayTimer); stopAudio(); order = shuffle(ITEMS); current = 0; render(); } document.getElementById('prev').onclick = ()=>{ if(current <= 0) return; current--; render(); }; document.getElementById('next').onclick = ()=>{ if(current >= order.length - 1) return; current++; render(); }; document.getElementById('play').onclick = ()=>{ playCurrent(); }; document.getElementById('replay').onclick = ()=>{ resetGame(); }; resetGame(); </script> </body> </html>
